<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estimated Payment Date Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e8eef5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: #0F2040;
    }

    .container { width: 100%; max-width: 520px; position: relative; }

    .header { text-align: center; margin-bottom: 1.25rem; }

    .logo-wrap { display: flex; justify-content: center; margin-bottom: 0.75rem; }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #0F5299;
      letter-spacing: -0.01em;
    }

    .card {
      background: #ffffff;
      border: 1px solid #c2d4e8;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(15, 82, 153, 0.08);
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }

    .field { display: flex; flex-direction: column; gap: 4px; }

    label {
      font-size: 12px;
      font-weight: 600;
      color: #0F5299;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select, input[type="date"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #a8c0da;
      border-radius: 6px;
      background: #f5f9fd;
      color: #0F2040;
      outline: none;
      font-family: inherit;
    }

    select:focus, input[type="date"]:focus {
      border-color: #0195D6;
      box-shadow: 0 0 0 3px rgba(1, 149, 214, 0.15);
      background: #fff;
    }

    hr { border: none; border-top: 1px solid #dce8f2; margin: 1.25rem 0; }

    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    .result-card {
      background: #f0f6fc;
      border: 1px solid #c2d4e8;
      border-radius: 8px;
      padding: 0.875rem 0.75rem;
      text-align: center;
    }

    .result-lbl {
      font-size: 11px;
      font-weight: 600;
      color: #0F5299;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .result-num {
      font-size: 15px;
      font-weight: 600;
      color: #0F2040;
      margin-top: 5px;
      line-height: 1.3;
    }

    .result-dow {
      font-size: 12px;
      color: #0195D6;
      font-weight: 500;
      margin-top: 3px;
    }

    .note {
      margin-top: 1rem;
      font-size: 11px;
      color: #5a7a99;
      text-align: center;
      font-style: italic;
      line-height: 1.5;
    }

    .badge-wrap { margin-top: 1rem; text-align: center; }

    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 20px;
    }

    .badge-green { background: #dff0d8; color: #2d6a14; }
    .badge-amber { background: #fef3cd; color: #7d4e00; }
    .badge-red   { background: #fde8e8; color: #8b1a1a; }

    .version {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-size: 10px;
      color: #a0b4c8;
      font-family: monospace;
    }

    @media (max-width: 400px) {
      .grid-2 { grid-template-columns: 1fr; }
      .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>

      <div class="grid-2">

          <label for="terms">Payment terms</label>
          <select id="terms">
            <option value="" disabled selected>Select terms</option>

            <option value="Net 45">Net 45</option>

            <option value="Net 90">Net 90</option>

      <div class="grid-3">
        <div class="result-card">
          <div class="result-lbl">Due date</div>
          <div class="result-num" id="dueDate">—</div>
          <div class="result-dow" id="dueDow"></div>

        <div class="result-card">
          <div class="result-lbl">Est. pay date</div>
          <div class="result-num" id="payDate">—</div>
          <div class="result-dow" id="payDow"></div>

  <div class="version">v1.8</div>

  <script>
    const companyPayday = { Quartz: 1, GCP: 2, Ceramics: 3, CT: 4, SAGE: 5 };
    const dowNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function nextWeekdayOnOrAfter(date, dow) {
      const d = new Date(date);
      const diff = (dow - d.getDay() + 7) % 7;
      d.setDate(d.getDate() + diff);
      return d;
    }

    function prevWeekday(date, dow) {
      const d = new Date(date);
      let diff = d.getDay() - dow;
      if (diff <= 0) diff += 7;
      d.setDate(d.getDate() - diff);
      return d;
    }

    function toWeekday(d) {
      const day = d.getDay();
      if (day === 6) d.setDate(d.getDate() - 1);
      else if (day === 0) d.setDate(d.getDate() - 2);
      return d;
    }

    function fifthOfMonth(date, offset) {
      return new Date(date.getFullYear(), date.getMonth() + offset, 5);
    }

    function proxDueDate(invoiceDate, proxType) {
      const day = invoiceDate.getDate();
      if (proxType === 'Prox 1')   return day <= 15 ? fifthOfMonth(invoiceDate, 1) : fifthOfMonth(invoiceDate, 2);
      if (proxType === 'Prox 1.5') return day <= 5  ? fifthOfMonth(invoiceDate, 1) : fifthOfMonth(invoiceDate, 2);
      return day <= 25 ? fifthOfMonth(invoiceDate, 2) : fifthOfMonth(invoiceDate, 3);
    }

    function getProxPayDate(dueDate, paydayDow) {
      const year = dueDate.getFullYear();
      const month = dueDate.getMonth();
      for (let day = 1; day <= 5; day++) {
        const d = new Date(year, month, day);
        if (d.getDay() === paydayDow) return toWeekday(d);
      }
      return toWeekday(new Date(year, month, 5));
    }

    function getNetPayDate(dueDate, paydayDow) {
      let candidate = nextWeekdayOnOrAfter(dueDate, paydayDow);
      const diff = Math.round((candidate - dueDate) / 86400000);
      if (diff > 0 && diff <= 6) candidate = prevWeekday(candidate, paydayDow);
      return toWeekday(candidate);
    }

    function fmtDate(d) {
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function calculate() {
      const company = document.getElementById('company').value;
      const terms = document.getElementById('terms').value;
      const invoiceDateStr = document.getElementById('invoiceDate').value;
      if (!company || !terms || !invoiceDateStr) return;

      const invoiceDate = new Date(invoiceDateStr + 'T12:00:00');
      const isProx = terms.startsWith('Prox');
      let dueDate, payDate;

      if (!isProx) {
        const days = parseInt(terms.split(' ')[1]);
        dueDate = addDays(invoiceDate, days);
        payDate = getNetPayDate(dueDate, companyPayday[company]);
      } else {
        dueDate = proxDueDate(invoiceDate, terms);
        payDate = getProxPayDate(dueDate, companyPayday[company]);
      }

      const today = new Date(); today.setHours(12, 0, 0, 0);
      const daysUntil = Math.round((payDate - today) / 86400000);

      document.getElementById('dueDate').textContent = fmtDate(dueDate);
      document.getElementById('dueDow').textContent = dowNames[dueDate.getDay()];
      document.getElementById('payDate').textContent = fmtDate(payDate);
      document.getElementById('payDow').textContent = dowNames[payDate.getDay()];
      document.getElementById('daysOut').textContent = daysUntil > 0 ? daysUntil : 0;

      const badge = document.getElementById('statusBadge');
      if (daysUntil < 0) {
        badge.innerHTML = '<span class="badge badge-red">Overdue</span>';
      } else if (daysUntil <= 7) {
        badge.innerHTML = '<span class="badge badge-amber">Payment due soon</span>';
      } else {
        badge.innerHTML = '<span class="badge badge-green">On track</span>';
      }
    }

    document.getElementById('company').addEventListener('change', calculate);
    document.getElementById('terms').addEventListener('change', calculate);
    document.getElementById('invoiceDate').addEventListener('change', calculate);
  </script>
</body>
</html>
